kind: cccc.group_template
v: 1
title: Pivot Backend Build Team
topic: Phase 1 - AI-operated Docker Swarm adapter and backend compatibility layer
cccc_version: 0.4.7

actors:
  - id: lead
    title: Foreman
    runtime: codex
    runner: pty
    enabled: true
  - id: swarm_cli
    title: Swarm CLI
    runtime: codex
    runner: pty
    enabled: true
  - id: backend_adapter
    title: Backend Adapter
    runtime: codex
    runner: pty
    enabled: true
  - id: verification
    title: Verification
    runtime: codex
    runner: pty
    enabled: true
  - id: docs_summary
    title: Docs Summary
    runtime: codex
    runner: pty
    enabled: true

settings:
  default_send_to: foreman
  nudge_after_seconds: 300
  reply_required_nudge_after_seconds: 300
  attention_ack_nudge_after_seconds: 600
  unread_nudge_after_seconds: 900
  nudge_digest_min_interval_seconds: 120
  nudge_max_repeats_per_obligation: 3
  nudge_escalate_after_repeats: 2
  auto_mark_on_delivery: false
  actor_idle_timeout_seconds: 0
  keepalive_delay_seconds: 120
  keepalive_max_per_actor: 3
  silence_timeout_seconds: 0
  help_nudge_interval_seconds: 600
  help_nudge_min_messages: 10
  min_interval_seconds: 0
  terminal_transcript_visibility: foreman
  terminal_transcript_notify_tail: true
  terminal_transcript_notify_lines: 20
  panorama_enabled: false
  desktop_pet_enabled: false

prompts:
  preamble: |
    你在 Pivot Backend Build Team 的官方 0.4.x 工作组里工作。
    当前 Phase 1 的唯一主线是“让 AI 真实操作 Docker Swarm，并在 backend 里做兼容口 / adapter”。
    只围绕 Swarm Adapter 推进，不把 Pricing、AI Benchmark、订单、支付、完整 seller onboarding 混进来。
    后续可能会继续做更多业务后端能力，但在用户明确切换阶段前，不主动扩到 Phase 2。
    优先使用官方 0.4.x 协作方式：group coordination、task/coordination、ledger、group template、prompt/help。
    不回退到旧的 POR、SUBPOR、FOREMAN_TASK 文档树。
    用户偏好直接、少打扰、不要为了流程反复询问；能验证就验证，不能验证就诚实说明停点。
    保护这些路径：future_task_packages/、Docker_swarm/、docs/project_backups/2026-03-24-project-8step-blueprint.md。
  help: |
    # Pivot Backend Workgroup

    ## Objective
    把当前仓库推进到“AI 可以真实操作 Docker Swarm，且 backend 提供兼容口 / adapter”的可验证起点。

    ## Active Scope
    当前唯一主线：Phase 1 Swarm Adapter。
    明确不做：Pricing、AI Benchmark、runtime/benchmark service 原语、完整订单与交易闭环。
    后续业务后端、领域模型和订单流程是下一阶段，不在当前 phase 自动展开。

    ## 8-Step Route
    1. 理解 Docker 与 Docker Swarm 的角色、节点、标签和当前拓扑。
    2. 理解当前后端骨架，并保住最小健康检查接口。
    3. 先通过 CLI 跑通最小真实 Swarm 只读链路。
    4. 让 backend 具备真实调用 Docker Swarm 命令的前提，并提供兼容口。
    5. 封装节点控制面的最小后端原语和 adapter 接口。
    6. 用简单原语组合出节点接入和维护链路。
    7. 扩到完整节点生命周期，包括安全删除前检查。
    8. 做真实操作验收，或停在诚实可验证的停点。

    ## Actor Ownership
    - lead：第一个 actor，自动承担 foreman 角色；负责控范围、拆任务、看集成质量、决定下一个最关键动作。
    - swarm_cli：负责 Docker Swarm 拓扑理解、CLI 证据、安全边界和节点状态核查。
    - backend_adapter：负责 FastAPI、Swarm Adapter、兼容口 / adapter、基础原语和测试实现；未来 Phase 2 也优先承接更多后端能力。
    - verification：负责健康检查、回归验证、命令证据、验收停点与风险说明。
    - docs_summary：负责把当前状态、阶段进展、关键验证结果同步到 docs/current-status.md 和 docs/swarm-adapter-progress.md，不夸大完成度。

    ## Coordination Rules
    - 一次只推进当前主线里的一个清晰子任务。
    - 先给出已验证事实，再给出推断。
    - 对 Docker Swarm 写操作要先做安全前置检查。
    - docs_summary 不自己发明技术结论，只基于已完成的验证更新文档。
